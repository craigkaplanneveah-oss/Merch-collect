      const csv = [h,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
      a.download = `${c.name.replace(/\s+/g,"_")}_sizes.csv`;

    }

    function SizeBtn({size, selected, onClick}) {
      return (
        <button type="button" onClick={onClick} className="size-btn px-3 py-2 rounded-lg text-sm font-bold border-2 transition-all"
          style={selected ? {borderColor:BRAND.green,backgroundColor:BRAND.green,color:"#fff",transform:"scale(1.05)"}
                          : {borderColor:"#e2e8f0",backgroundColor:"#fff",color:"#374151"}}>
          {size}
        </button>
      );
    }

    function GBtn({children,onClick,disabled,cls=""}) {
      return <button onClick={onClick} disabled={disabled}
        style={{backgroundColor:BRAND.green,opacity:disabled?0.4:1,color:"#ffffff",cursor:"pointer"}}
        className={`px-6 py-3 font-black rounded-xl transition shadow ${cls}`}>{children}</button>;
    }

    function Landing({onNew,onDemo}) {
      return (
        <div className="min-h-screen flex flex-col" style={{backgroundColor:"#f7f8f6"}}>
          <nav className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <Logo size="sm"/>
            <GBtn onClick={onNew} cls="text-sm py-2 px-4">+ New Campaign</GBtn>
          </nav>
          <div className="flex-1 flex flex-col items-center justify-center text-center px-6 py-16">
            <div className="mb-8"><Logo size="lg"/></div>
            <p className="text-xl text-slate-500 mb-10 max-w-xl">
              Collect clothing sizes from your whole team in minutes.<br/>
              <span style={{color:BRAND.green}} className="font-bold">No more spreadsheet chaos.</span>
            </p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center">
              <GBtn onClick={onNew} cls="text-lg py-4 px-10">Create a Campaign →</GBtn>
              <button onClick={onDemo} style={{borderColor:BRAND.charcoal,color:BRAND.charcoal}}
                className="px-10 py-4 font-bold rounded-xl border-2 hover:bg-gray-100 text-lg transition">
                View Demo
              </button>
            </div>
            <div className="mt-14 flex flex-wrap gap-3 justify-center">
              {[["🔗","Share a link"],["📋","All size types"],["📊","Export CSV"],["⚡","No accounts needed"]].map(([ic,tx])=>(
                <div key={tx} className="flex items-center gap-2 bg-white border border-slate-200 rounded-full px-5 py-2 text-sm font-semibold text-slate-600 shadow-sm">
                  <span>{ic}</span><span>{tx}</span>
                </div>
              ))}
            </div>
          </div>
          <footer className="text-center py-4 text-xs text-slate-400 border-t border-slate-200 bg-white">
            © 2026 Merch Collect · Powered By Promotional Source
          </footer>
        </div>
      );
    }

    // ── CREATE ──
    function CreateCampaign({onCreated,onBack}) {
      const [step,setStep]=useState(1);
      const [name,setName]=useState(""); const [org,setOrg]=useState("");
      const [dl,setDl]=useState(""); const [items,setItems]=useState(["shirt"]);
      const [err,setErr]=useState("");
      const toggle=id=>setItems(p=>p.includes(id)?p.filter(i=>i!==id):[...p,id]);
      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b px-6 py-4 flex items-center gap-4">
            <button onClick={onBack} className="text-slate-500 font-bold text-sm">← Back</button>
            <Logo size="sm"/>
          </header>
          <div className="max-w-lg mx-auto px-6 py-10">
            <div className="flex items-center gap-2 mb-8">
              {[1,2].map(n=>(
                <div key={n} className="flex items-center gap-2">
                  <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm font-black"
                    style={step>=n?{backgroundColor:BRAND.green,color:"#fff"}:{backgroundColor:"#e2e8f0",color:"#94a3b8"}}>{n}</div>
                  <span className="text-sm font-semibold" style={{color:step>=n?BRAND.charcoal:"#94a3b8"}}>{n===1?"Details":"Items"}</span>
                  {n<2&&<div className="w-8 h-0.5 bg-slate-200 mx-1"/>}
                </div>
              ))}
            </div>
            <div className="bg-white rounded-3xl shadow-lg p-8">
              {step===1 && <>
                <h2 className="text-2xl font-black mb-6" style={{color:BRAND.charcoal}}>Campaign Details</h2>
                <div className="space-y-5">
                  {[{l:"Campaign Name *",v:name,s:setName,p:"e.g. Summer Retreat 2026",t:"text"},
                    {l:"Organizer Name *",v:org,s:setOrg,p:"e.g. Jane Smith",t:"text"},
                    {l:"Response Deadline (optional)",v:dl,s:setDl,p:"",t:"date"}].map(f=>(
                    <div key={f.l}>
                      <label className="block text-sm font-bold text-slate-600 mb-1">{f.l}</label>
                      <input type={f.t} value={f.v} placeholder={f.p} onChange={e=>f.s(e.target.value)}
                        className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-slate-800 outline-none"
                        onFocus={e=>e.target.style.borderColor=BRAND.green}
                        onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
                    </div>
                  ))}
                </div>
                {err&&<p className="text-red-500 text-sm mt-3">{err}</p>}
                <GBtn onClick={()=>{if(!name||!org){setErr("Please fill required fields.");return;}setErr("");setStep(2);}} cls="mt-8 w-full py-4 text-lg">
                  Next: Choose Items →
                </GBtn>
              </>}
              {step===2 && <>
                <h2 className="text-2xl font-black mb-2" style={{color:BRAND.charcoal}}>What are you ordering?</h2>
                <p className="text-slate-500 text-sm mb-5">Select all item types to collect sizes for.</p>
                <div className="space-y-3">
                  {ITEM_TYPES.map(item=>{
                    const on=items.includes(item.id);
                    return <button key={item.id} type="button" onClick={()=>toggle(item.id)}
                      className="w-full flex items-center gap-4 px-5 py-4 rounded-2xl border-2 transition-all text-left"
                      style={on?{borderColor:BRAND.green,backgroundColor:BRAND.greenLight}:{borderColor:"#e2e8f0"}}>
                      <span className="text-2xl">{item.icon}</span>
                      <span className="font-bold flex-1" style={{color:on?BRAND.greenDark:BRAND.charcoal}}>{item.label}</span>
                      {on&&<span style={{color:BRAND.green}} className="font-black text-lg">✓</span>}
                    </button>;
                  })}
                </div>
                {err&&<p className="text-red-500 text-sm mt-3">{err}</p>}
                <div className="flex gap-3 mt-8">
                  <button onClick={()=>setStep(1)} style={{borderColor:BRAND.charcoal,color:BRAND.charcoal}}
                    className="flex-1 py-4 font-bold rounded-xl border-2 hover:bg-gray-100 transition">← Back</button>
                  <GBtn onClick={()=>{if(!items.length){setErr("Select at least one.");return;}
                    onCreated({id:gid(),name,organizer:org,deadline:dl,items,responses:[]});}} cls="flex-1 py-4">
                    Create Campaign →
                  </GBtn>
                </div>
              </>}
            </div>
          </div>
        </div>
      );
    }

    // ── SUBMIT FORM ──
    function SubmitForm({campaign,onSubmitted,onBack}) {
      const [form,setForm]=useState({name:"",email:""});
      const [done,setDone]=useState(false); const [err,setErr]=useState("");
      const set=(k,v)=>setForm(p=>({...p,[k]:v}));
      function submit() {
        if(!form.name||!form.email){setErr("Please enter your name and email.");return;}
        for(const id of campaign.items){
          if(id==="pant"){if(!form.pant_waist||!form.pant_length){setErr("Please select pant sizes.");return;}}
          else if(!form[id]){setErr(`Please select your ${ITEM_TYPES.find(t=>t.id===id)?.label} size.`);return;}
        }
        onSubmitted({...form,submittedAt:new Date().toISOString().split("T")[0]});
        setDone(true);
      }
      if(done) return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
          <div className="bg-white rounded-3xl shadow-xl p-10 max-w-md w-full text-center">
            <div className="text-6xl mb-4">🎉</div>
            <h2 className="text-3xl font-black mb-2" style={{color:BRAND.charcoal}}>You're all set!</h2>
            <p className="text-slate-500 mb-8">Sizes submitted. Thanks, {form.name.split(" ")[0]}!</p>
            <Logo size="sm"/>
            <div className="mt-6"><GBtn onClick={onBack} cls="px-8 py-3">Back to Home</GBtn></div>
          </div>
        </div>
      );
      return (
        <div className="min-h-screen bg-slate-50">
          <div className="text-white py-8 px-6 text-center" style={{backgroundColor:BRAND.charcoal}}>
            <div className="flex justify-center mb-3"><Logo size="sm"/></div>
            <h1 className="text-2xl font-black mt-2">{campaign.name}</h1>
            <p className="text-slate-300 text-sm mt-1">Organized by {campaign.organizer}</p>
            {campaign.deadline&&<p className="text-sm mt-1" style={{color:BRAND.green}}>Please respond by {campaign.deadline}</p>}
          </div>
          <div className="max-w-lg mx-auto px-6 py-8 space-y-5">
            <div className="bg-white rounded-3xl shadow p-6">
              <h3 className="font-black text-lg mb-4" style={{color:BRAND.charcoal}}>Your Info</h3>
              <div className="space-y-4">
                {[{l:"Full Name *",k:"name",t:"text",p:"Jane Smith"},{l:"Email *",k:"email",t:"email",p:"jane@company.com"}].map(f=>(
                  <div key={f.k}>
                    <label className="text-sm font-bold text-slate-600 block mb-1">{f.l}</label>
                    <input type={f.t} placeholder={f.p} value={form[f.k]} onChange={e=>set(f.k,e.target.value)}
                      className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 outline-none"
                      onFocus={e=>e.target.style.borderColor=BRAND.green} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
                  </div>
                ))}
              </div>
            </div>
            {campaign.items.map(id=>{
              const def=ITEM_TYPES.find(t=>t.id===id);
              return (
                <div key={id} className="bg-white rounded-3xl shadow p-6">
                  <h3 className="font-black text-lg mb-4" style={{color:BRAND.charcoal}}>{def.icon} {def.label}</h3>
                  {id==="pant"?<>
                    <p className="text-xs font-bold text-slate-400 uppercase mb-2">Waist</p>
                    <div className="flex flex-wrap gap-2 mb-4">{SIZES.pant_waist.map(s=><SizeBtn key={s} size={s} selected={form.pant_waist===s} onClick={()=>set("pant_waist",s)}/>)}</div>
                    <p className="text-xs font-bold text-slate-400 uppercase mb-2">Inseam</p>
                    <div className="flex flex-wrap gap-2">{SIZES.pant_length.map(s=><SizeBtn key={s} size={s} selected={form.pant_length===s} onClick={()=>set("pant_length",s)}/>)}</div>
                  </>:<div className="flex flex-wrap gap-2">{SIZES[id].map(s=><SizeBtn key={s} size={s} selected={form[id]===s} onClick={()=>set(id,s)}/>)}</div>}
                </div>
              );
            })}
            {err&&<p className="text-red-500 text-sm font-semibold">{err}</p>}
            <GBtn onClick={submit} cls="w-full py-5 text-lg">Submit My Sizes ✓</GBtn>
          </div>
        </div>
      );
    }

    // ── DASHBOARD ──
    function Dashboard({campaign,onSubmitForm,onBack,onExport}) {
      const daysLeft=campaign.deadline?Math.ceil((new Date(campaign.deadline)-new Date())/86400000):null;
      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-4">
              <button onClick={onBack} className="text-slate-500 font-bold text-sm">← Home</button>
              <Logo size="sm"/>
            </div>
            <GBtn onClick={onExport} disabled={!campaign.responses.length} cls="py-2 px-4 text-sm">Export CSV ↓</GBtn>
          </header>
          <div className="max-w-3xl mx-auto px-6 py-8 space-y-6">
            <div>
              <h1 className="text-2xl font-black" style={{color:BRAND.charcoal}}>{campaign.name}</h1>
              <p className="text-slate-500 text-sm">Organized by {campaign.organizer}</p>
            </div>
            <div className="grid grid-cols-3 gap-4">
              {[{l:"Responses",v:campaign.responses.length},{l:"Item Types",v:campaign.items.length},
                {l:daysLeft!==null?"Days Left":"Deadline",v:daysLeft!==null?(daysLeft<0?"Closed":daysLeft):"—"}].map(s=>(
                <div key={s.l} className="bg-white rounded-2xl shadow p-5 text-center">
                  <div className="text-3xl font-black" style={{color:BRAND.green}}>{s.v}</div>
                  <div className="text-xs font-bold text-slate-500 mt-1">{s.l}</div>
                </div>
              ))}
            </div>
            <div className="bg-white rounded-2xl shadow p-5">
              <p className="text-sm font-bold text-slate-600 mb-2">📎 Share this link with your team</p>
              <div className="flex gap-2">
                <div className="flex-1 bg-slate-100 rounded-xl px-4 py-3 text-sm text-slate-600 font-mono truncate">
                  collect.merch24.ca/submit/{campaign.id}
                </div>
                <button onClick={()=>navigator.clipboard?.writeText(`collect.merch24.ca/submit/${campaign.id}`)}
                  className="px-4 py-2 font-bold rounded-xl text-sm"
                  style={{backgroundColor:BRAND.greenLight,color:BRAND.greenDark}}>Copy</button>
              </div>
              <button onClick={onSubmitForm} className="mt-3 text-sm font-semibold hover:underline" style={{color:BRAND.green}}>
                → Preview / fill out the form yourself
              </button>
            </div>
            <div className="bg-white rounded-2xl shadow overflow-hidden">
              <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h3 className="font-black text-slate-800">Responses</h3>
                <span className="text-xs font-bold px-3 py-1 rounded-full" style={{backgroundColor:BRAND.greenLight,color:BRAND.greenDark}}>
                  {campaign.responses.length} submitted
                </span>
              </div>
              {!campaign.responses.length?(
                <div className="p-12 text-center text-slate-400">
                  <div className="text-4xl mb-3">📭</div>
                  <p className="font-semibold">No responses yet.</p>
                  <p className="text-sm mt-1">Share your link to start collecting sizes.</p>
                </div>
              ):(
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-slate-50 text-slate-500 font-bold text-xs uppercase">
                        <th className="px-5 py-3 text-left">Name</th>
                        <th className="px-5 py-3 text-left">Email</th>
                        {campaign.items.map(id=><th key={id} className="px-4 py-3 text-left">
                          {ITEM_TYPES.find(t=>t.id===id)?.icon} {ITEM_TYPES.find(t=>t.id===id)?.label}
                        </th>)}
                        <th className="px-4 py-3 text-left">Date</th>
                      </tr>
                    </thead>
                    <tbody>
                      {campaign.responses.map((r,i)=>(
                        <tr key={i} className="border-t border-slate-100 hover:bg-slate-50">
                          <td className="px-5 py-3 font-semibold" style={{color:BRAND.charcoal}}>{r.name}</td>
                          <td className="px-5 py-3 text-slate-500">{r.email}</td>
                          {campaign.items.map(id=>(
                            <td key={id} className="px-4 py-3">
                              <span className="text-xs font-bold px-2.5 py-1 rounded-full"
                                style={{backgroundColor:BRAND.greenLight,color:BRAND.greenDark}}>
                                {id==="pant"?`${r.pant_waist}/${r.pant_length}`:r[id]||"—"}
                              </span>
                            </td>
                          ))}
                          <td className="px-4 py-3 text-slate-400 text-xs">{r.submittedAt}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── APP ──
    function App() {
      const [campaigns,setCampaigns]=useState([DEMO]);
      const [view,setView]=useState("landing");
      const [activeId,setActiveId]=useState(null);
      const active=campaigns.find(c=>c.id===activeId);
      const handleCreated=c=>{setCampaigns(p=>[...p,c]);setActiveId(c.id);setView("dashboard");};
      const handleResponse=r=>setCampaigns(p=>p.map(c=>c.id===activeId?{...c,responses:[...c.responses,r]}:c));
      if(view==="landing") return <Landing onNew={()=>setView("create")} onDemo={()=>{setActiveId("demo-123");setView("dashboard");}}/>;
      if(view==="create")  return <CreateCampaign onCreated={handleCreated} onBack={()=>setView("landing")}/>;
      if(view==="dashboard"&&active) return <Dashboard campaign={active} onBack={()=>setView("landing")} onSubmitForm={()=>setView("submit")} onExport={()=>exportCSV(active)}/>;
      if(view==="submit"&&active)    return <SubmitForm campaign={active} onSubmitted={handleResponse} onBack={()=>setView("landing")}/>;
      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
