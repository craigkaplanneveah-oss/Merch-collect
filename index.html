async function saveCampaignToDb(campaign) {
try {
const { error } = await supabase.from(‘campaigns’).upsert({
id: campaign.id, name: campaign.name, organizer: campaign.organizer,
deadline: campaign.deadline || null, data: JSON.stringify(campaign)
});
if (error) console.error(‘Save campaign error:’, error);
} catch(e) { console.error(‘saveCampaign:’, e); }
}

async function saveAllowedEmails(campaignId, emails) {
try {
const rows = emails.map(e => ({ campaign_id: campaignId, email: e.email.toLowerCase().trim(), name: e.name || ‘’ }));
const { error } = await supabase.from(‘allowed_emails’).upsert(rows, { onConflict: ‘campaign_id,email’ });
if (error) console.error(‘Save emails error:’, error);
} catch(e) { console.error(‘saveEmails:’, e); }
}

async function checkEmailAllowed(campaignId, email) {
try {
const { data, error } = await supabase.from(‘allowed_emails’)
.select(’*’).eq(‘campaign_id’, campaignId).eq(‘email’, email.toLowerCase().trim()).single();
if (error) return { allowed: false, alreadySubmitted: false };
return { allowed: true, alreadySubmitted: data.submitted, name: data.name };
} catch(e) { return { allowed: false, alreadySubmitted: false }; }
}

async function markEmailSubmitted(campaignId, email) {
try {
await supabase.from(‘allowed_emails’)
.update({ submitted: true }).eq(‘campaign_id’, campaignId).eq(‘email’, email.toLowerCase().trim());
} catch(e) { console.error(‘markSubmitted:’, e); }
}

async function saveResponse(campaignId, response) {
try {
const { error } = await supabase.from(‘responses’).insert({
campaign_id: campaignId, email: response.email, name: response.name,
data: JSON.stringify(response), submitted_at: new Date().toISOString()
});
if (error) console.error(‘Save response error:’, error);
} catch(e) { console.error(‘saveResponse:’, e); }
}

function exportCSV(c) {
if (!c.responses.length) return;
const cols = [“Name”,“Email”,“Ship To”];
c.items.forEach(item => {
const label = item.customLabel||item.label;
cols.push(`${label} - Gender`);
cols.push(`${label} - Size`);
if (item.colors?.length) cols.push(`${label} - Color`);
});
cols.push(“Submitted”);
const rows = c.responses.map(r => {
const addrObj = c.addresses?.find(a=>a.id===r.shipTo);
const addrStr = addrObj ? `${addrObj.name}: ${addrObj.line1}` : (r.shipTo||””);
const row = [r.name, r.email, addrStr];
c.items.forEach(item => {
row.push(r[item.id+”_gender”]||””);
row.push(r[item.id+”_size”]||””);
if (item.colors?.length) row.push(r[item.id+”_color”]||””);
});
row.push(r.submittedAt);
return row;
});
const csv = [cols,…rows].map(r=>r.map(v=>`"${v}"`).join(”,”)).join(”\n”);
const a = document.createElement(“a”);
a.href = URL.createObjectURL(new Blob([csv],{type:“text/csv”}));
a.download = `${c.name.replace(/\s+/g,"_")}_sizes.csv`;
a.click();
}

// ── COUNTDOWN TIMER ──
function CountdownTimer({deadline}) {
const [timeLeft, setTimeLeft] = useState(null);

React.useEffect(() => {
if (!deadline) return;
function calc() {
const diff = new Date(deadline) - new Date();
if (diff <= 0) { setTimeLeft({expired:true}); return; }
const days = Math.floor(diff / 86400000);
const hours = Math.floor((diff % 86400000) / 3600000);
const mins = Math.floor((diff % 3600000) / 60000);
const secs = Math.floor((diff % 60000) / 1000);
setTimeLeft({days,hours,mins,secs,expired:false});
}
calc();
const t = setInterval(calc, 1000);
return () => clearInterval(t);
}, [deadline]);

if (!deadline || !timeLeft) return null;

if (timeLeft.expired) return (
<div className=“px-6 py-3 text-center text-sm font-bold” style={{backgroundColor:”#fee2e2”,color:”#dc2626”}}>
⚠️ This campaign has closed — no more orders are being accepted.
</div>
);

const urgent = timeLeft.days < 2;
return (
<div className=“px-4 py-3” style={{backgroundColor: urgent ? “#fee2e2” : BRAND.charcoal}}>
<div className="max-w-lg mx-auto">
<p className=“text-center text-xs font-bold mb-2” style={{color: urgent ? “#dc2626” : “#94a3b8”}}>
{urgent ? “⚠️ ORDER DEADLINE APPROACHING” : “⏰ ORDER DEADLINE”}
</p>
<div className="flex justify-center gap-3">
{[{v:timeLeft.days,l:“Days”},{v:timeLeft.hours,l:“Hours”},{v:timeLeft.mins,l:“Mins”},{v:timeLeft.secs,l:“Secs”}].map(t=>(
<div key={t.l} className="text-center">
<div className=“text-2xl font-black w-14 py-1 rounded-xl text-center”
style={{backgroundColor: urgent ? “#dc2626” : BRAND.green, color:”#fff”}}>
{String(t.v).padStart(2,“0”)}
</div>
<div className=“text-xs font-bold mt-1” style={{color: urgent ? “#dc2626” : “#94a3b8”}}>{t.l}</div>
</div>
))}
</div>
</div>
</div>
);
}

function SubmitForm({campaign,onSubmitted,onBack}) {
const [form,setForm]=useState({name:””,email:””,shipTo:””});
const [done,setDone]=useState(false); const [err,setErr]=useState(””);
const [emailChecked,setEmailChecked]=useState(false); const [emailValid,setEmailValid]=useState(false);
const [checkingEmail,setCheckingEmail]=useState(false);

async function verifyEmail() {
if (!form.email) { setErr(“Please enter your email.”); return; }
if (!form.email.includes(’@’)) { setErr(“Please enter a valid email.”); return; }
// If no allowed list, skip check
if (!campaign.allowedEmails?.length) { setEmailChecked(true); setEmailValid(true); return; }
setCheckingEmail(true); setErr(””);
const result = await checkEmailAllowed(campaign.id, form.email);
setCheckingEmail(false);
if (!result.allowed) { setErr(“Your email is not on the invited list for this campaign.”); return; }
if (result.alreadySubmitted) { setErr(“You have already submitted an order for this campaign.”); return; }
if (result.name && !form.name) setForm(p=>({…p, name: result.name}));
setEmailChecked(true); setEmailValid(true);
}
const set=(k,v)=>setForm(p=>({…p,[k]:v}));

async function submit() {
if(!form.name||!form.email){setErr(“Please enter your name and email.”);return;}
if((campaign.addresses?.length||campaign.allowCustomAddress)&&!form.shipTo){setErr(“Please select a ship-to address.”);return;}
if(form.shipTo===“custom”&&(!form.custom_line1||!form.custom_city||!form.custom_postal||!form.custom_province)){setErr(“Please complete your custom shipping address.”);return;}
// Count selected items
const selectedCount = campaign.items.filter(item =>
form[item.id+”_size”] || (item.id===“other” && form[item.id+”_selected”]) || (item.id===“pant” && form[item.id+”_waist”])
).length;
if(campaign.orderLimit&&campaign.orderLimit<99&&selectedCount>campaign.orderLimit){
setErr(`You can only order up to ${campaign.orderLimit} item${campaign.orderLimit===1?"":"s"}. Please deselect some items.`);return;
}
if(campaign.orderLimit&&campaign.orderLimit<99&&selectedCount===0){
setErr(“Please select at least one item.”);return;
}
for(const item of campaign.items){
const key=item.id;
if(!form[key+”_gender”]&&item.genders?.length){setErr(`Please select gender for ${item.customLabel||item.label}.`);return;}
// Only require size if user selected this item (or all items required when no limit)

function EmailListManager({campaign, onUpdate}) {
const fileRef = React.useRef();
const [uploading, setUploading] = useState(false);
const [sending, setSending] = useState(false);
const [sendStatus, setSendStatus] = useState(null);
const [progress, setProgress] = useState({done:0,total:0});
const allowedEmails = campaign.allowedEmails || [];
const sentEmails = campaign.sentInvites || [];

async function handleExcelUpload(e) {
const file = e.target.files[0];
if (!file) return;
setUploading(true);
try {
const data = await file.arrayBuffer();
const wb = XLSX.read(data);
const ws = wb.Sheets[wb.SheetNames[0]];
const rows = XLSX.utils.sheet_to_json(ws, {header:1});
// Find header row - look for email column
let emailCol = -1, nameCol = -1;
let startRow = 0;
for (let i = 0; i < Math.min(5, rows.length); i++) {
const row = rows[i];
row.forEach((cell, j) => {
const v = String(cell||’’).toLowerCase().trim();
if (v.includes(‘email’)) emailCol = j;
if (v.includes(‘name’) || v.includes(‘first’)) nameCol = j;
});
if (emailCol >= 0) { startRow = i+1; break; }
}
if (emailCol < 0) {
// assume first col = name, second = email OR first = email
const firstRow = rows[0] || [];
const firstVal = String(firstRow[0]||’’);
if (firstVal.includes(’@’)) { emailCol = 0; nameCol = -1; startRow = 0; }
else { nameCol = 0; emailCol = 1; startRow = 1; }
}
const emails = [];
for (let i = startRow; i < rows.length; i++) {
const row = rows[i];
if (!row || !row[emailCol]) continue;
const email = String(row[emailCol]).trim().toLowerCase();
if (!email.includes(’@’)) continue;
const name = nameCol >= 0 ? String(row[nameCol]||’’).trim() : ‘’;
emails.push({ email, name });
}
if (emails.length === 0) { alert(‘No valid emails found. Make sure your Excel has an “email” column.’); setUploading(false); return; }
// Save to Supabase
await saveAllowedEmails(campaign.id, emails);
// Update campaign locally
const updated = {…campaign, allowedEmails: […allowedEmails, …emails.filter(e => !allowedEmails.find(x=>x.email===e.email))]};
onUpdate(updated);
await saveCampaignToDb(updated);
alert(`✅ Uploaded ${emails.length} email${emails.length===1?'':'s'} successfully!`);
} catch(err) {
console.error(err);
alert(‘Error reading file. Make sure it is a valid .xlsx or .csv file.’);
}
setUploading(false);
e.target.value = ‘’;
}

async function sendInvites() {
const unsent = allowedEmails.filter(e => !sentEmails.includes(e.email));
if (!unsent.length) { alert(‘All emails have already been invited!’); return; }
if (!confirm(`Send invite emails to ${unsent.length} people?`)) return;
setSending(true);
setSendStatus(null);
setProgress({done:0, total:unsent.length});
const orderLink = `https://collect.merch24.ca/submit/${campaign.id}`;
const deadlineText = campaign.deadline || ‘’;
let successCount = 0;
const newSent = […sentEmails];
for (let i = 0; i < unsent.length; i++) {
const person = unsent[i];
const ok = await sendInviteEmail(person.email, person.name, campaign.name, orderLink, deadlineText);
if (ok) { successCount++; newSent.push(person.email); }
setProgress({done:i+1, total:unsent.length});
if (i < unsent.length-1) await new Promise(r=>setTimeout(r,1200)); // rate limit
}
const updated = {…campaign, sentInvites: newSent};
onUpdate(updated);
await saveCampaignToDb(updated);
setSending(false);
setSendStatus(`✅ Sent ${successCount} of ${unsent.length} invites!`);
}

function removeEmail(email) {
const updated = {…campaign, allowedEmails: allowedEmails.filter(e=>e.email!==email)};
onUpdate(updated);
saveCampaignToDb(updated);
}

function downloadTemplate() {
const ws = XLSX.utils.aoa_to_sheet([[‘first_name’,‘email’],[‘John Smith’,‘john@company.com’],[‘Jane Doe’,‘jane@company.com’]]);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, ‘Employees’);
XLSX.writeFile(wb, ‘merch_collect_template.xlsx’);
}

const unsentCount = allowedEmails.filter(e=>!sentEmails.includes(e.email)).length;
const submittedCount = allowedEmails.filter(e=>campaign.responses?.find(r=>r.email===e.email)).length;

return (

// ── PASSWORD GATE ──
function PasswordGate({onUnlock}) {
const [pw, setPw] = useState(””);
const [err, setErr] = useState(false);
const [shake, setShake] = useState(false);

function tryPassword() {
if (pw === ADMIN_PASSWORD) {
sessionStorage.setItem(“mc_auth”, “1”);
onUnlock();
} else {
setErr(true);
setShake(true);
setPw(””);
setTimeout(() => setShake(false), 600);
}
}

return (
<div className=“min-h-screen flex flex-col items-center justify-center px-6” style={{backgroundColor:”#f7f8f6”}}>
<div className="mb-8"><Logo size="lg"/></div>
<div className={`bg-white rounded-3xl shadow-lg p-8 w-full max-w-sm ${shake?"animate-shake":""}`}
style={{animation: shake ? “shake 0.5s ease” : “none”}}>
<h2 className=“text-xl font-black text-center mb-1” style={{color:”#484848”}}>Admin Access</h2>
<p className="text-sm text-slate-400 text-center mb-6">Enter your password to continue</p>
<div className="space-y-4">
<input
type=“password”
placeholder=“Password”
value={pw}
onChange={e=>{setPw(e.target.value);setErr(false);}}
onKeyDown={e=>e.key===“Enter”&&tryPassword()}
autoFocus
className=“w-full border-2 rounded-xl px-4 py-3 outline-none text-center text-lg tracking-widest”
style={{borderColor: err ? “#ef4444” : “#e2e8f0”}}
onFocus={e=>e.target.style.borderColor=err?”#ef4444”:”#6abf47”}
onBlur={e=>e.target.style.borderColor=err?”#ef4444”:”#e2e8f0”}
/>
{err && <p className="text-red-500 text-sm text-center font-semibold">Incorrect password — try again</p>}
<GBtn onClick={tryPassword} cls="w-full py-3 text-lg">Enter →</GBtn>
</div>
</div>
<p className="text-xs text-slate-400 mt-6">© 2026 Merch Collect · Powered By Promotional Source</p>
<style>{`@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }`}</style>
</div>
);
}

// ── APP ──
function App() {
const [campaigns,setCampaigns]=useState([]);
const [view,setView]=useState(“home”);
const [activeId,setActiveId]=useState(null);
const [authed,setAuthed]=useState(()=>sessionStorage.getItem(“mc_auth”)===“1”);
const active=campaigns.find(c=>c.id===activeId);
const handleCreated=async c=>{setCampaigns(p=>[…p,c]);setActiveId(c.id);setView(“dashboard”);await saveCampaignToDb(c);};
const handleResponse=r=>setCampaigns(p=>p.map(c=>c.id===activeId?{…c,responses:[…c.responses,r]}:c));
const goHome=()=>setView(campaigns.length>0?“campaigns”:“home”);

function loadDemo() {
const demo = createDemoCampaign();
setCampaigns(p=>{
const exists = p.find(c=>c.name===demo.name);
if(exists){setActiveId(exists.id);setView(“dashboard”);return p;}
setActiveId(demo.id);
setView(“dashboard”);
return […p, demo];
});
}

// Submit view is public - no password needed for clients placing orders
if(view===“submit”&&active) return <SubmitForm campaign={active} onSubmitted={handleResponse} onBack={()=>setView(“home”)}/>;

// All other views require admin password
if(!authed) return <PasswordGate onUnlock={()=>setAuthed(true)}/>;

if(view===“home”) return <Landing onNew={()=>setView(“create”)} onViewAll={campaigns.length>0?()=>setView(“campaigns”):null} onDemo={loadDemo}/>;
if(view===“campaigns”) return <CampaignList campaigns={campaigns} onNew={()=>setView(“create”)} onOpen={id=>{setActiveId(id);setView(“dashboard”);}}/>;
if(view===“create”)  return <CreateCampaign onCreated={handleCreated} onBack={goHome}/>;
if(view===“dashboard”&&active) return <Dashboard campaign={active} onBack={()=>setView(“campaigns”)} onSubmitForm={()=>setView(“submit”)} onExport={()=>exportCSV(active)} onUpdate={c=>setCampaigns(p=>p.map(x=>x.id===c.id?c:x))}/>;
return null;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
